<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confident</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>

  <!-- ─── HEADER ─── -->
  <header class="header">
    <span class="logo">Confident</span>
    <div class="session-status">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Sin sesión activa</span>
    </div>
  </header>

  <!-- ─── MAIN ─── -->
  <main class="main">

    <!-- Estado inicial: esperando consentimiento -->
    <div id="consentState" class="consent-state hidden">
      <div class="consent-icon">⚠️</div>
      <p class="consent-title">Antes de comenzar</p>

      <!-- Checkbox de consentimiento OBLIGATORIO -->
      <div class="consent-checkbox-wrapper">
        <label class="consent-label">
          <input type="checkbox" id="consentCheckbox" />
          <span>He informado a los participantes de que esta conversación será transcrita y he obtenido su consentimiento.</span>
        </label>
      </div>

      <!-- Campo opcional: emails de participantes -->
      <div class="participants-section">
        <label class="input-label">
          Emails de participantes (opcional)
          <span class="input-hint">Se enviará transcripción al finalizar</span>
        </label>
        <input
          type="text"
          id="participantEmails"
          placeholder="email1@ejemplo.com, email2@ejemplo.com"
          class="email-input"
        />
      </div>

      <!-- Botón para confirmar y comenzar -->
      <button id="startSessionBtn" class="btn-start-session" disabled>
        Iniciar sesión
      </button>
    </div>

    <!-- Estado vacío: no hay sesión activa -->
    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">🎯</div>
      <p class="empty-title">Listo para ayudarte</p>
      <p class="empty-desc">
        Abre Google Meet y activa Confident<br>desde el popup de la extensión
      </p>
    </div>

    <!-- Estado escuchando: sesión activa, sin sugerencia todavía -->
    <div id="listeningState" class="listening-state hidden">
      <div class="listening-animation">
        <span></span><span></span><span></span>
      </div>
      <p class="listening-text">Escuchando...</p>
      <p id="statusMsg" class="status-msg hidden"></p>
    </div>

    <!-- Contenedor de tarjetas (máximo 3) -->
    <div id="suggestionsContainer"></div>

  </main>

  <!-- ─── BOTÓN TERMINAR SESIÓN ─── -->
  <div class="end-session-wrapper hidden" id="endSessionWrapper">
    <button class="btn-end-session" id="endSessionBtn">
      <span>✓</span>
      <span>He terminado esta reunión</span>
    </button>
    <p class="end-session-hint">Ver resumen y transcripción en Dashboard</p>
  </div>

  <!-- ─── HISTORIAL ─── -->
  <section class="history-section">
    <button class="history-toggle" id="historyToggle">
      <span id="historyArrow">▸</span>
      <span>Historial</span>
      <span id="historyCount" class="history-count hidden">0</span>
    </button>
    <ul class="history-list hidden" id="historyList"></ul>
  </section>

  <!-- ─── CONTADOR DE SESIONES (discreto) ─── -->
  <footer class="session-counter-footer hidden" id="sessionCounterFooter">
    <p class="counter-text" id="counterFooterText"></p>
  </footer>

  <script src="../config.js"></script>
  <script src="panel.js"></script>
</body>
</html>
