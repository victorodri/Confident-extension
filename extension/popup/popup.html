<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confident</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">

    <!-- Cabecera -->
    <header class="header">
      <div class="header-top">
        <span class="logo">Confident</span>
        <select id="language-selector" class="language-selector">
          <option value="es">🇪🇸 Español</option>
          <option value="en">🇬🇧 English</option>
        </select>
      </div>
      <span class="tagline" data-i18n="tagline"></span>
    </header>

    <!-- Estado de sesión (oculto cuando no hay sesión activa) -->
    <div id="session-status" class="session-status hidden">
      <span class="status-dot"></span>
      <span id="status-text" data-i18n="sessionActive"></span>
    </div>

    <!-- Selector de perfil -->
    <section id="profile-section">
      <p class="section-label" data-i18n="selectProfile"></p>
      <div class="profiles">
        <button class="profile-btn" data-profile="candidato">
          <span class="profile-icon">🎯</span>
          <span class="profile-name" data-i18n="profileCandidate"></span>
          <span class="profile-desc" data-i18n="profileCandidateDesc"></span>
        </button>
        <button class="profile-btn" data-profile="vendedor">
          <span class="profile-icon">💼</span>
          <span class="profile-name" data-i18n="profileSales"></span>
          <span class="profile-desc" data-i18n="profileSalesDesc"></span>
        </button>
        <button class="profile-btn" data-profile="defensor">
          <span class="profile-icon">🛡️</span>
          <span class="profile-name" data-i18n="profileDefender"></span>
          <span class="profile-desc" data-i18n="profileDefenderDesc"></span>
        </button>
      </div>
    </section>

    <!-- Clave de Deepgram ya no necesaria - ahora está en el backend
    <section id="api-key-section">
      <p class="section-label">Deepgram API Key <span class="dev-badge">dev</span></p>
      <input
        type="password"
        id="deepgram-key"
        placeholder="Pega tu API key aquí"
        autocomplete="off"
      />
      <p class="api-hint">
        <strong>¿Cómo obtener tu API key?</strong><br>
        1. Ve a <a href="https://console.deepgram.com" target="_blank">console.deepgram.com</a><br>
        2. Regístrate gratis ($200 de crédito)<br>
        3. Crea un proyecto y copia tu API key
      </p>
    </section>
    -->

    <!-- Checkbox de consentimiento (Sesión 6) -->
    <section id="consent-section" class="consent-section hidden">
      <label class="consent-label">
        <input type="checkbox" id="consent-checkbox" />
        <span data-i18n="consentLabel"></span>
      </label>
    </section>

    <!-- Campo opcional: emails de participantes (Sesión 6) -->
    <section id="emails-section" class="emails-section hidden">
      <label class="input-label">
        <span data-i18n="participantEmailsLabel"></span>
        <span class="input-hint" data-i18n="participantEmailsHint"></span>
      </label>
      <input
        type="text"
        id="participant-emails"
        data-i18n-placeholder="participantEmailsPlaceholder"
        class="email-input"
      />
    </section>

    <!-- Botón de acción principal -->
    <div class="action-area">
      <button id="request-mic-btn" class="btn-start hidden" data-i18n="requestMicButton">
      </button>
      <button id="start-btn" class="btn-start" disabled data-i18n="startButton">
      </button>
      <button id="stop-btn" class="btn-stop hidden" data-i18n="stopButton">
      </button>
      <button id="open-panel-btn" class="btn-panel hidden" data-i18n="openPanelButton">
      </button>
    </div>

    <!-- Mensajes de error -->
    <p id="error-msg" class="error-msg hidden"></p>

    <!-- Aviso: debe estar en Meet -->
    <p id="not-in-meet" class="warning-msg hidden">
      Abre Google Meet para activar Confident.
    </p>

  </div>

  <script src="../config.js"></script>
  <script src="../logger.js"></script>
  <script src="../device-fingerprint.js"></script>
  <script src="popup.js"></script>
</body>
</html>
